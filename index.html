<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS DOM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <center>
        <div class="container">
            <div class="header">
                <h3>Pendaftaran Peminatan</h3>
            </div>
            <form action="">
                <!-- Input nama | Nama anda -->
                 <label for="nama">Nama</label><br/>
                 <input 
                    type="text"
                    placeholder="Nama anda"
                    id="nama"
                 /><br/><br/>
                <!-- NIM | NIM anda-->
                 <label for="nim">NIM</label> <br/>
                 <input 
                    type="text"
                    placeholder="NIM anda"
                    id="nim"
                 /><br/><br/>
                <!-- Angkatan | -- Pilih Angkatan -- -->
                 <label for="angkatan">Angkatan</label> <br/>
                 <select name="angkatan" id="angkatan">
                    <option value="">-- Pilih Angkatan</option>
                    <option value="2020">2020</option>
                    <option value="2021">2021</option>
                    <option value="2022">2022</option>
                    <option value="2023">2023</option>
                    <option value="2024">2024</option>
                    <option value="2025">2025</option>
                 </select><br/><br/>
                <!-- Peminatan pada bidang | Programming, Desain, Jaringan, Data -->
                 <p>Peminatan pada bidang</p>
                 <input type="radio" name="peminatan" id="programming" value="programming"/>
                 <label for="programming">Programming</label> <br/>

                 <input type="radio" name="peminatan" id="desain" value="desain">
                 <label for="desain">Desain</label> <br/>

                 <input type="radio" name="peminatan" id="jaringan" value="jaringan">
                 <label for="jaringan">Jaringan</label> <br/>

                 <input type="radio" name="peminatan" id="data" value="data">
                 <label for="data">Data</label> <br/> <br/>
                <!-- Tanggal -->
                 <label for="tanggal">Tanggal</label><br/>
                 <input type="date" id="tanggal"/><br/><br/>
                <!-- Alamat -->
                 <label for="alamat">Alamat</label><br />
                 <textarea placeholder="Tulis alamatmu di sini" name="alamat" id="alamat" cols="45" rows="5"></textarea>
                <br/><br/>
                <!-- Submit -->
                 <button type="submit" onclick="kirimData()">Submit</button>
            </form>
        </div>
    </center>
    <script src="script.js"></script>
</body>
</html>
